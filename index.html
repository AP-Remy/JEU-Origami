<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carnot's Draft</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <symbol id="icone_mains" viewBox="0 0 40 40">
        <polygon points="20,4 36,20 20,36 4,20" fill="#c9ad8c"/>
        <polygon points="20,4 36,20 20,20" fill="#e6d4bb"/>
      </symbol>

      <symbol id="icone_auto" viewBox="0 0 40 40">
        <polygon points="20,4 36,20 20,36 4,20" fill="#9db4d0"/>
        <polygon points="20,4 36,20 20,20" fill="#c9d6e6"/>
      </symbol>

      <symbol id="icone_miura" viewBox="0 0 40 40">
        <polygon points="20,4 34,14 20,24 6,14" fill="#c7aed6"/>
        <polygon points="20,24 34,14 34,28 20,36" fill="#8f7aa8"/>
        <polygon points="20,24 6,14 6,28 20,36" fill="#a893bf"/>
      </symbol>

      <symbol id="icone_usine" viewBox="0 0 40 40">
        <polygon points="4,34 4,16 14,24 14,10 26,20 26,8 36,18 36,34" fill="#a9c2b8"/>
        <polygon points="4,34 20,20 36,34" fill="#d3e2da"/>
      </symbol>

      <symbol id="icone_heighway" viewBox="0 0 40 40">
        <polygon points="6,30 20,6 34,30" fill="#d6b8ae"/>
        <polygon points="14,30 20,18 26,30" fill="#7a5f57"/>
      </symbol>

      <symbol id="icone_labo" viewBox="0 0 40 40">
        <polygon points="20,4 32,12 32,26 20,34 8,26 8,12" fill="#b8c9a3"/>
        <polygon points="20,4 32,12 20,20 8,12" fill="#dbe6c9"/>
      </symbol>

      <symbol id="icone_koch" viewBox="0 0 40 40">
        <polygon points="20,2 23.5,13.9 35.6,11 27,20 35.6,29 23.5,26.1 20,38 16.5,26.1 4.4,29 13,20 4.4,11 16.5,13.9" fill="#a9d0e0"/>
        <polygon points="23.5,13.9 27,20 23.5,26.1 16.5,26.1 13,20 16.5,13.9" fill="#6fa8c2"/>
        <polygon points="20,2 23.5,13.9 16.5,13.9" fill="#dcf0f7"/>
      </symbol>

      <symbol id="icone_boulanger" viewBox="0 0 40 40">
        <polygon points="6,8 34,8 34,16 6,16" fill="#b8863f"/>
        <polygon points="8,16 32,16 32,24 8,24" fill="#d1a559"/>
        <polygon points="10,24 30,24 30,32 10,32" fill="#eccd8f"/>
      </symbol>

      <symbol id="icone_brownien" viewBox="0 0 40 40">
        <polygon points="17,17 23,17 23,23 17,23" fill="#6fb8b0"/>
        <polygon points="4,4 12,3 10,11" fill="#a8dcd4"/>
        <polygon points="36,36 28,37 30,29" fill="#4d8f87"/>
        <polygon points="8,32 4,26 12,26" fill="#a8dcd4"/>
        <polygon points="34,6 30,12 36,13" fill="#4d8f87"/>
      </symbol>

      <symbol id="icone_joule" viewBox="0 0 40 40">
        <polygon points="16,16 24,16 24,24 16,24" fill="#e0743f"/>
        <polygon points="16,16 24,16 20,2" fill="#f2a35f"/>
        <polygon points="24,16 24,24 38,20" fill="#f2a35f"/>
        <polygon points="16,24 24,24 20,38" fill="#c9552a"/>
        <polygon points="16,16 16,24 2,20" fill="#c9552a"/>
      </symbol>

      <symbol id="icone_lorenz" viewBox="0 0 40 40">
        <ellipse cx="15" cy="20" rx="15" ry="7" transform="rotate( 20 15 20)" fill="#f2a35f" opacity="1"/>
        <ellipse cx="25" cy="20" rx="15" ry="7" transform="rotate(-50 25 20)" fill="#c9552a" opacity="0.85"/>
      </symbol>

      <symbol id="icone_landauer" viewBox="0 0 40 40">
        <polygon points="6,10 34,10 34,30 6,30" fill="#3a3a42"/>
        <polygon points="10,14 20,14 20,26 10,26" fill="#f0f0f0"/>
        <polygon points="20,14 30,14 30,26 20,26" fill="#1a1a1e"/>
      </symbol>

      <symbol id="icone_turing" viewBox="0 0 40 40">
        <polygon points="4,16 36,16 36,24 4,24" fill="#7f8fa6"/>
        <polygon points="8,16 14,16 14,24 8,24" fill="#b7c2d4"/>
        <polygon points="20,16 26,16 26,24 20,24" fill="#4a5568"/>
        <polygon points="23,6 29,6 26,16" fill="#d6a3b8"/>
      </symbol>

      <symbol id="icone_schrodinger" viewBox="0 0 40 40">
        <polygon points="20,4 34,20 20,36 6,20" fill="#8f9bb0"/>
        <polygon points="20,4 34,20 20,20" fill="#c4cede"/>
        <polygon points="20,20 34,20 20,36" fill="#5a6478"/>
      </symbol>

      <symbol id="icone_boltzmann" viewBox="0 0 40 40">
        <polygon points="20,3 33,11 33,29 20,37 7,29 7,11" fill="#ce8ae3"/>
        <polygon points="20,3 33,11 20,19 7,11" fill="#e2c6eb"/>
        <polygon points="20,19 33,11 33,29 20,37" fill="#dbc3e3"/>
      </symbol>

      <symbol id="icone_hawking" viewBox="0 0 40 40">
        <polygon points="20,4 36,20 20,36 4,20" fill="#1c2030"/>
        <polygon points="20,10 30,20 20,30 10,20" fill="#2e3350"/>
        <polygon points="20,4 23,0 17,0" fill="#f2b45f"/>
        <polygon points="36,20 40,17 40,23" fill="#f2b45f"/>
        <polygon points="20,36 23,40 17,40" fill="#f2b45f"/>
        <polygon points="4,20 0,17 0,23" fill="#f2b45f"/>
      </symbol>

      <symbol id="icone_trounoir" viewBox="0 0 40 40">
        <polygon points="2,20 12,8 28,8 38,20 28,32 12,32" fill="#2a1f3d"/>
        <polygon points="20,5 35,20 20,35 5,20" fill="#d97a3f"/>
        <polygon points="20,12 28,20 20,28 12,20" fill="#050308"/>
      </symbol>

      <symbol id="icone_wormhole" viewBox="0 0 40 40">
        <polygon points="20,3 37,20 20,37 3,20" fill="#4a5fb8"/>
        <polygon points="20,10 30,20 20,30 10,20" fill="#8a6fd1"/>
        <polygon points="20,16 24,20 20,24 16,20" fill="#e8e4fb"/>
      </symbol>

      <symbol id="icone_hulivers" viewBox="0 0 40 40">
        <polygon points="20,2 38,20 20,38 2,20" fill="#1c2b1c"/>
        <polygon points="20,8 32,20 20,32 8,20" fill="#3a6b3a"/>
        <polygon points="20,15 25,20 20,25 15,20" fill="#050805"/>
      </symbol>

      <symbol id="icone_mortthermique" viewBox="0 0 40 40">
        <polygon points="20,2 38,20 20,38 2,20" fill="#d8d6de"/>
        <polygon points="20,2 38,20 20,20" fill="#eceafe"/>
        <polygon points="20,20 38,20 20,38" fill="#c2c0cc"/>
      </symbol>

    </defs>
  </svg>








  <button id="reglages-bouton" class="reglages-bouton" aria-label="Réglages">⚙</button>

  <div id="reglages-panneau" class="reglages-panneau" hidden>
    <div class="reglages-boite">
      <div class="reglages-entete">
        <h2>Réglages</h2>
        <button id="reglages-fermer" aria-label="Fermer">✕</button>
      </div>

      <section class="reglages-bloc">
        <h3>Sauvegarde</h3>
        <p class="reglages-note">La partie est sauvegardée automatiquement dans ce navigateur.</p>
      </section>

      <section class="reglages-bloc">
        <h3>Exporter</h3>
        <p class="reglages-note">Copiez ce code pour reprendre votre partie ailleurs.</p>
        <textarea id="code-export" rows="3" readonly></textarea>
        <div class="reglages-actions">
          <button id="bouton-exporter">Régénérer</button>
          <button id="bouton-copier">Copier</button>
        </div>
      </section>

      <section class="reglages-bloc">
        <h3>Importer</h3>
        <textarea id="code-import" rows="3" placeholder="Collez votre code ici"></textarea>
        <div class="reglages-actions">
          <button id="bouton-importer">Charger</button>
        </div>
        <p id="import-message" class="reglages-message"></p>
      </section>

      <section class="reglages-bloc">
        <h3>Réinitialiser</h3>
        <button id="bouton-reinitialiser" class="bouton-danger">Réinitialiser la partie</button>
      </section>
    </div>
  </div>

  <div class="jeu">

    <header class="entete">
      <span class="entete-label">Entropie</span>
      <div class="entete-ligne">
        <p id="entropie">0</p>
        <span id="entropie-taux" class="entropie-taux" hidden></span>
      </div>
    </header>

    <aside class="panneau-puzzle" id="panneau-puzzle" hidden>

      <section class="panneau-section">
        <div id="puzzle" class="puzzle-carte">
          <div id="suite" class="puzzle-suite"></div>
          <div class="puzzle-actions">
            <input id="reponse" type="number" placeholder="Graine du Chaos">
            <button id="valider">Valider</button>
          </div>
          <p id="resultat" class="puzzle-resultat"></p>
        </div>
      </section>

      <section class="panneau-section" id="section-simon" hidden>
        <div id="simon" class="simon-carte">
          <svg id="simon-feuille" class="simon-feuille" viewBox="0 0 100 100">
            <polygon class="simon-cote" data-cote="haut"   points="50,6 94,50 50,50"/>
            <polygon class="simon-cote" data-cote="droite" points="94,50 50,94 50,50"/>
            <polygon class="simon-cote" data-cote="bas"    points="50,94 6,50 50,50"/>
            <polygon class="simon-cote" data-cote="gauche" points="6,50 50,6 50,50"/>
          </svg>
          <button id="simon-lancer" class="simon-lancer">Lancer une manche</button>
          <p id="simon-resultat" class="simon-resultat"></p>
        </div>
      </section>

    </aside>

    <main class="aire-pliage">
      <button id="pliage" aria-label="Plier">
        <svg class="pliage-forme" viewBox="0 0 100 100">
          <polygon points="50,6 94,50 50,94 6,50" class="face face-a"/>
          <polygon points="50,6 94,50 50,50" class="face face-b"/>
          <polygon points="50,50 94,50 50,94" class="face face-c"/>
        </svg>
      </button>
      <p id="aire-pliage-note" class="aire-pliage-note">Cliquer pour plier</p>
    </main>

    <aside class="panneau" id="panneau-plieuses" hidden>

      <section class="panneau-section">
        <h2>Machines de Maxwell</h2>
        <div id="boutique"></div>
      </section>

      <section class="panneau-section" id="section-ameliorations" hidden>
        <h2>Améliorations</h2>
        <div id="upgrades"></div>
        <p id="puissance-clic" class="puissance-clic" hidden></p>
      </section>

    </aside>

  </div>

  <script src="puzzle.js"></script>
  <script src="simon.js"></script>
  <script src="script.js"></script>
</body>
</html>
